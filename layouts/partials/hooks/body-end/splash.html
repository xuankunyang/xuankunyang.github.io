<div id="splash-screen">
    <canvas id="splash-canvas"></canvas>
    <div class="splash-content">
        <h1 class="splash-title">Welcome to My Website</h1>
        <div class="splash-controls">
            <button class="splash-btn" id="enter-site-btn">Enter</button>
            <select class="mood-selector" id="mood-select">
                <option value="neutral">Neutral</option>
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="thinking">Thinking</option>
                <option value="surprised">Surprised</option>
            </select>
        </div>
    </div>
</div>

<script src="/js/particle-avatar.js"></script>
<script>
    (function () {
        const splashScreen = document.getElementById('splash-screen');
        if (!splashScreen) return;

        // Check if splash has been seen in this session
        if (sessionStorage.getItem('splashSeen') === 'true') {
            splashScreen.style.display = 'none';
            return;
        }

        // Prevent scrolling while splash is visible
        document.body.style.overflow = 'hidden';

        // Initialize Particle Avatar
        let particleAvatar;
        // Ensure the script is loaded
        if (window.ParticleAvatar) {
            particleAvatar = new ParticleAvatar('splash-canvas');
        } else {
            // Fallback if script hasn't loaded yet (though it should be sync)
            window.addEventListener('load', () => {
                if (window.ParticleAvatar) {
                    particleAvatar = new ParticleAvatar('splash-canvas');
                }
            });
        }

        const enterBtn = document.getElementById('enter-site-btn');
        const moodSelect = document.getElementById('mood-select');

        if (moodSelect) {
            moodSelect.addEventListener('change', (e) => {
                if (particleAvatar) {
                    particleAvatar.setMood(e.target.value);
                }
            });
        }

        function hideSplash() {
            if (splashScreen.classList.contains('splash-hidden')) return;

            splashScreen.classList.add('splash-hidden');
            sessionStorage.setItem('splashSeen', 'true');
            document.body.style.overflow = ''; // Restore scrolling

            setTimeout(() => {
                splashScreen.style.display = 'none';
                if (particleAvatar) {
                    particleAvatar.destroy();
                }
            }, 1000); // Wait for CSS transition (1s)
        }

        if (enterBtn) {
            enterBtn.addEventListener('click', hideSplash);
        }

        // Auto-hide after 60 seconds
        setTimeout(hideSplash, 60000);
    })();
</script>
