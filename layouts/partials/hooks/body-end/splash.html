<div id="splash-screen" data-splash="true">
    <canvas id="splash-canvas"></canvas>
    <div class="splash-content">
        <h1 class="splash-title">Welcome to My Website</h1>
        <div class="splash-controls">
            <button class="splash-btn" onclick="enterWebsite()">Enter</button>
            <select class="mood-selector" onchange="particleAvatar.setMood(this.value)">
                <option value="neutral">Neutral</option>
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="thinking">Thinking</option>
                <option value="surprised">Surprised</option>
            </select>
        </div>
    </div>
</div>

<script src="/js/particle-avatar.js"></script>
<script>
    let particleAvatar;

    document.addEventListener('DOMContentLoaded', () => {
        console.log('Splash screen init script running...');
        const splashScreen = document.getElementById('splash-screen');
        const enterBtn = document.getElementById('enter-site-btn');
        const moodSelect = document.getElementById('mood-select');

        if (!splashScreen) {
            console.error('Splash screen element not found!');
            return;
        }

        // Initialize Particle Avatar
        if (window.ParticleAvatar) {
            console.log('Initializing ParticleAvatar...');
            particleAvatar = new window.ParticleAvatar('splash-canvas');

            // Handle mood change
            moodSelect.addEventListener('change', (e) => {
                particleAvatar.setMood(e.target.value);
            });

            // Handle enter site
            enterBtn.addEventListener('click', () => {
                hideSplashScreen();
            });
        } else {
            console.error('window.ParticleAvatar is not defined!');
        }

        // Automatically hide splash screen after 5 seconds
        setTimeout(() => {
            hideSplashScreen();
        }, 5000);
    });

    function hideSplashScreen() {
        const splashScreen = document.getElementById('splash-screen');
        if (splashScreen) {
            splashScreen.classList.add('splash-hidden');
            setTimeout(() => {
                splashScreen.remove(); // Remove splash screen from DOM
                if (particleAvatar) {
                    particleAvatar.destroy(); // Stop particle animation
                }
            }, 1000); // Wait for transition to complete
        }

        // Ensure main content is visible after splash screen
        document.body.style.overflow = 'auto';
    }

    function enterWebsite() {
        const splashScreen = document.getElementById('splash-screen');
        if (splashScreen) {
            splashScreen.classList.add('splash-hidden');
            setTimeout(() => {
                splashScreen.remove(); // Remove splash screen from DOM
                if (particleAvatar) {
                    particleAvatar.destroy(); // Stop particle animation
                }
            }, 1000); // Wait for transition to complete
        }

        // Ensure main content is visible after splash screen
        document.body.style.overflow = 'auto';
    }
</script>
